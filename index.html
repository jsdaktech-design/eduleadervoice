const { useState, useEffect, useRef } = React;

// ============================================================
// ICON — thin wrapper around lucide
// ============================================================
function Icon({ name, className = "w-5 h-5", strokeWidth = 1.5 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = "";
    const el = document.createElement("i");
    el.setAttribute("data-lucide", name);
    ref.current.appendChild(el);
    if (window.lucide) window.lucide.createIcons({ attrs: { "stroke-width": strokeWidth } });
    const svg = ref.current.querySelector("svg");
    if (svg) { svg.setAttribute("class", className); svg.removeAttribute("width"); svg.removeAttribute("height"); }
  }, [name, className, strokeWidth]);
  return <span ref={ref} className="inline-flex" aria-hidden="true" />;
}

// ============================================================
// PRIMITIVES (shadcn-flavored)
// ============================================================
function Button({ children, variant = "primary", size = "md", className = "", ...props }) {
  const base = "inline-flex items-center justify-center gap-2 font-medium transition-all duration-200 focus-ring rounded-lg disabled:opacity-50 disabled:pointer-events-none whitespace-nowrap";
  const sizes = {
    sm: "h-9 px-3.5 text-sm",
    md: "h-11 px-5 text-[15px]",
    lg: "h-12 px-6 text-[15px]",
  };
  const variants = {
    primary: "bg-navy text-cream hover:bg-navy-900 shadow-softer hover:shadow-soft",
    gold: "bg-gold text-cream hover:bg-gold-600 shadow-softer hover:shadow-soft",
    outline: "border border-navy/20 text-navy hover:border-navy hover:bg-navy/[0.03]",
    ghost: "text-navy hover:bg-navy/[0.05]",
    subtle: "bg-navy-50 text-navy hover:bg-navy-100",
  };
  return (
    <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>
      {children}
    </button>
  );
}

function Card({ children, className = "" }) {
  return (
    <div className={`bg-white rounded-xl shadow-softer ${className}`}
         style={{ boxShadow: "inset 0 0 0 1px rgba(19,35,27,0.08), 0 1px 2px rgba(19,35,27,0.04), 0 2px 8px -2px rgba(19,35,27,0.06)" }}>

}

}

function Input({ label, id, error, className = "", ...props }) {

}

function Textarea({ label, id, error, className = "", ...props }) {

        }`}
        {...props}
      />
      {error && <p className="mt-1 text-xs text-red-600">{error}</p>}
    </div>
  );
}

function Dialog({ open, onClose, children }) {
  useEffect(() => {
    if (!open) return;
    const onEsc = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onEsc);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onEsc); document.body.style.overflow = ""; };
  }, [open, onClose]);

  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
      <div className="absolute inset-0 bg-navy-900/55 backdrop-blur-sm" onClick={onClose} />
      <div className="relative w-full max-w-lg bg-cream rounded-xl shadow-lift border border-navy/10 max-h-[90vh] overflow-y-auto">
        {children}
      </div>
    </div>
  );
}

// Raw thoughts that become finished posts — shown two ways: in voice, and the way a generic ghostwriter would flatten them
const DRAFTS = [
  {
    topic: "AI in the classroom",
    note: "Every student now has a tool that can write their essay in seconds. Banning it is a fantasy and pretending it changes nothing is worse. The real question is what part of learning must stay difficult.",
    voice: [
      "This year, a tool arrived in every classroom on our campus that can write a passable essay in seconds. We chose neither to ban it nor to celebrate it.",
      "We asked a harder question instead: which part of learning is supposed to stay difficult? A student who lets a model build their argument has saved an afternoon — and lost the very thing the afternoon was for.",
      "So our approach is not about detection software. It rests on disclosure and judgement: students may use AI openly, must show how they used it, and are examined on the reasoning no machine can outsource for them.",
      "Three principles now guiding how we bring AI into the lecture hall — without surrendering what a university is for —",
    ],
    generic: [
      "🤖 Exciting times ahead — our university is now officially AI-powered! 🚀",
      "In this era of digital transformation, embracing artificial intelligence is no longer optional, it's essential.",
      "We're empowering students and faculty to leverage cutting-edge AI tools for a smarter, future-ready campus.",
      "The future of education is here and we're leading the charge! 💡 #AI #EdTech #Innovation #FutureOfLearning",
    ],
    likes: 1280, comments: 96,
  },
];

function InteractiveDraft() {
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState("idle"); // idle | drafting | done
  const [view, setView] = useState("voice"); // voice | generic
  const timers = useRef([]);
  const d = DRAFTS[idx];

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };
  useEffect(() => () => clearTimers(), []);

  const startDraft = () => {
    clearTimers();
    setView("voice");
    setPhase("drafting");
    timers.current.push(setTimeout(() => setPhase("done"), 1150));
  };
  const pick = (i) => { clearTimers(); setIdx(i); setView("voice"); setPhase("idle"); };
  const another = () => { clearTimers(); setIdx((idx + 1) % DRAFTS.length); setView("voice"); setPhase("idle"); };

  return (
    <Card className="p-0 overflow-hidden bg-white w-full flex flex-col min-h-[472px]">
      {/* Topic selector */}
      <div className="px-5 pt-5 pb-4 border-b border-navy/10">
        <div className="flex items-center gap-2 mb-3 text-[11px] uppercase tracking-[0.15em] text-navy-500 font-medium">
          <Icon name="sparkles" className="w-3.5 h-3.5 text-gold-600" strokeWidth={1.75} /> Try it — see it in your voice
        </div>
        <div className="flex flex-wrap gap-2">
          {DRAFTS.map((p, i) => (
            <button key={i} onClick={() => pick(i)}
              className={`px-3 h-8 rounded-full text-[13px] font-medium transition-colors focus-ring ${
                i === idx ? "bg-navy text-cream" : "bg-navy/[0.05] text-navy-600 hover:bg-navy/10"
              }`}>
              {p.topic}
            </button>
          ))}
        </div>
      </div>

      {/* Body */}
      <div className="flex-1 flex flex-col">
        {phase === "idle" && (
          <div className="p-6 flex-1 flex flex-col">
            <div className="flex items-center gap-2 text-[12px] uppercase tracking-[0.14em] text-gold-600 font-medium mb-4">
              <Icon name="pencil-line" className="w-4 h-4" strokeWidth={1.75} /> A passing thought
            </div>
            <div className="flex-1 flex items-center">
              <p className="font-serif text-[22px] md:text-[24px] leading-[1.38] text-navy italic">
                {d.note}
              </p>
            </div>
            <button onClick={startDraft}
              className="mt-6 self-start inline-flex items-center gap-2 h-11 px-5 rounded-lg bg-gold text-cream text-[15px] font-medium hover:bg-gold-600 transition-colors focus-ring">
              Draft in my voice
              <Icon name="arrow-right" className="w-4 h-4" />
            </button>
          </div>
        )}

        {phase === "drafting" && (
          <div className="p-6 flex-1">
            <div className="flex items-center gap-3 mb-6">
              <div className="w-11 h-11 rounded-full bg-navy text-cream flex items-center justify-center">
                <Icon name="user-round" className="w-5 h-5" strokeWidth={1.75} />
              </div>
              <div>
                <div className="text-[15px] font-medium text-navy">A Professor &amp; Vice Chancellor</div>
                <div className="text-xs text-gold-700 inline-flex items-center gap-1.5">
                  <Icon name="feather" className="w-3.5 h-3.5" /> Drafting in your voice
                  <span className="draft-dot">·</span><span className="draft-dot" style={{ animationDelay: '.15s' }}>·</span><span className="draft-dot" style={{ animationDelay: '.3s' }}>·</span>
                </div>
              </div>
            </div>
            <div className="space-y-3.5">
              <div className="shimmer-line h-3.5 rounded w-[92%]" />
              <div className="shimmer-line h-3.5 rounded w-[97%]" />
              <div className="shimmer-line h-3.5 rounded w-[80%]" />
              <div className="shimmer-line h-3.5 rounded w-[88%]" />
              <div className="shimmer-line h-3.5 rounded w-[64%]" />
            </div>
          </div>
        )}

        {phase === "done" && (
          <React.Fragment>
            <div className="px-6 pt-6 pb-4 flex items-center gap-3">
              <div className="w-11 h-11 rounded-full bg-navy text-cream flex items-center justify-center">
                <Icon name="user-round" className="w-5 h-5" strokeWidth={1.75} />
              </div>
              <div className="min-w-0">
                <div className="text-[15px] font-medium text-navy">A Professor &amp; Vice Chancellor</div>
                <div className="text-xs text-navy-500">Higher education · just now</div>
              </div>
              <div className="ml-auto text-navy-300"><Icon name="linkedin" className="w-5 h-5" /></div>
            </div>

            {/* The same thought, two ways — flip to see what a generic ghostwriter does to it */}
            <div className="px-6 pb-4">

  const root = document.documentElement;
  root.style.setProperty("--paper", p.paper);
  root.style.setProperty("--paper-100", p.paper100);
  root.style.setProperty("--paper-200", p.paper200);
  if (p.dark) {
    root.style.setProperty("--ink", "#f4f1e8");
    document.body.classList.add("palette-dark");
  } else {
    root.style.setProperty("--ink", "#1e3a32");
    document.body.classList.remove("palette-dark");
  }
}

function TweaksPanel({ current, onChange, onClose }) {
  return (
    <div className="fixed bottom-5 right-5 z-[60] w-[300px] bg-white border border-navy/15 rounded-xl shadow-lift overflow-hidden"
         style={{ boxShadow: "0 8px 32px rgba(19,35,27,0.18)" }}>
      <div className="flex items-center justify-between px-4 py-3 border-b border-navy/10 bg-cream-100">
        <div className="flex items-center gap-2">
          <Icon name="palette" className="w-4 h-4 text-navy" strokeWidth={1.75} />
          <span className="font-serif text-[15px] text-navy">Tweaks</span>
        </div>
        <button onClick={onClose} className="p-1 text-navy-400 hover:text-navy rounded">
          <Icon name="x" className="w-4 h-4" />
        </button>
      </div>
      <div className="p-4">
        <div className="text-[11px] uppercase tracking-[0.15em] text-navy-500 font-medium mb-3">
          Background palette
        </div>
        <div className="grid grid-cols-1 gap-1.5">
          {PALETTES.map(p => {
            const active = p.id === current;
            return (
              <button
                key={p.id}
                onClick={() => onChange(p.id)}
                className={`flex items-center gap-3 px-2.5 py-2 rounded-lg text-left transition-colors ${
                  active ? "bg-navy text-cream" : "hover:bg-navy/[0.05] text-navy"
                }`}
              >
                <span className="w-8 h-8 rounded-md border flex-shrink-0"
                  style={{ background: p.swatch, borderColor: active ? "rgba(244,241,232,0.25)" : "rgba(19,35,27,0.12)" }} />
                <span className="flex-1 min-w-0">
                  <span className="block text-[13px] font-medium">{p.name}</span>
                  <span className={`block text-[11px] ${active ? "text-cream/60" : "text-navy-500"}`}>{p.sub}</span>
                </span>
                {active && <Icon name="check" className="w-3.5 h-3.5 flex-shrink-0" strokeWidth={2.25} />}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [demoOpen, setDemoOpen] = useState(false);
  const [tweaksOn, setTweaksOn] = useState(false);
  const [paletteId, setPaletteId] = useState(TWEAK_DEFAULTS.paletteId || "sage");
  const open = () => setDemoOpen(true);

  useEffect(() => { applyPalette(paletteId); }, [paletteId]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOn(true);
      else if (e.data.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (err) {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const changePalette = (id) => {
    setPaletteId(id);
    try {
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { paletteId: id } }, "*");
    } catch (err) {}
  };

  return (
    <div className="min-h-screen">
      <Nav onOpenDemo={open} />
      <main>
        <Hero onOpenDemo={open} />
        <Problem />
        <HowItWorks />
        <Pricing onOpenDemo={open} />
        <FAQ />
        <FinalCTA onOpenDemo={open} />
      </main>
      <Footer />
      <DemoDialog open={demoOpen} onClose={() => setDemoOpen(false)} />
      {tweaksOn && (
        <TweaksPanel
          current={paletteId}
          onChange={changePalette}
          onClose={() => setTweaksOn(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
